name: passwordLogin

on:
  workflow_dispatch:
    inputs:
      append_user:
        description: "是否追加模式（是/否）"
        required: true
        default: "否"
      print_userinfo:
        description: "是否在日志打印 USERINFO（是/否）"
        required: true
        default: "否"

permissions:
  contents: write

jobs:
  login:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 创建node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: ./api/package-lock.json

      - name: 配置 git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Cache node_modules
        id: cache-npm
        uses: actions/cache@v5
        with:
          path: ./api/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('./api/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: 安装依赖
        run: npm run install
        if: ${{ steps.cache-npm.outputs.cache-hit != 'true' }}

      - name: 账号密码登录
        run: npm run passwordLogin
        env:
          APPEND_USER: ${{ github.event.inputs.append_user }}

      - name: 打印 USERINFO（如需要）
        if: ${{ github.event.inputs.print_userinfo == '是' }}
        run: |
          echo "========== USERINFO =========="
          cat userinfo.json
          echo "================================"

      - name: 提交 userinfo.json
        run: |
          if [[ -n "$(git status --porcelain userinfo.json)" ]]; then
            git add userinfo.json
            git commit -m "chore: 自动更新 userinfo.json (密码登录)"
            git push
            echo "✅ userinfo.json 已更新并推送"
          else
            echo "ℹ️ userinfo.json 无变化"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
